<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manage your booking - IFB Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0a1f44;--navy2:#12305f;--gold:#c8a24b;--ink:#1c2230;--muted:#6b7280;
    --line:#e7e4dd;--bg:#f6f5f2;--card:#fff;--ok:#1a7f4b;--err:#a23a3a}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"DM Sans",system-ui,sans-serif;line-height:1.55}
  h1,h2{font-family:"Cormorant Garamond",Georgia,serif;color:var(--navy);font-weight:600;margin:0 0 .3em}
  a{color:var(--navy)}
  .top{background:var(--navy);border-bottom:3px solid var(--gold);padding:16px 22px;color:#fff}
  .brand{font-family:"Cormorant Garamond",serif;font-size:22px;letter-spacing:.5px}
  .wrap{max-width:560px;margin:28px auto;padding:0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:26px}
  .tt{font-size:15px;margin:4px 0}
  .tt b{color:var(--navy)}
  .badge{display:inline-block;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.04em}
  .b-scheduled{background:#eef6f0;color:var(--ok)}
  .b-cancelled{background:#fbeeee;color:var(--err)}
  .b-no_show{background:#fff5e6;color:#9a6b00}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
  .btn:hover{background:var(--navy2)}
  .btn.gold{background:var(--gold);color:#1a1300}
  .btn.ghost{background:#fff;color:var(--err);border:1px solid var(--line)}
  .btn:disabled{opacity:.5;cursor:default}
  .err{color:var(--err);font-size:14px}
  .ok{color:var(--ok);font-size:14px}
  .note{color:var(--muted);font-size:13px}
  .hr{height:1px;background:var(--line);margin:18px 0}
  .row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .chip{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink);min-width:64px;text-align:center}
  .chip:hover{border-color:var(--gold)}
  .chip.sel{background:var(--navy);color:#fff;border-color:var(--navy)}
  .chip small{display:block;color:var(--muted);font-size:11px}
  .chip.sel small{color:#cdd6e8}
  .slot{border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px 0;font-size:14px;cursor:pointer;font-family:inherit;color:var(--navy);font-weight:600}
  .slot:hover{border-color:var(--gold);background:#fffdf7}
  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px;margin-top:6px}
  .panel{margin-top:8px}
</style>
</head>
<body>
  <div class="top"><span class="brand">IFB Bank</span></div>
  <div class="wrap"><div class="card" id="stage"><p class="note">Loading…</p></div></div>
<script>
const token=new URLSearchParams(location.search).get("token");
const $=s=>document.querySelector(s);
let BK=null;

function fmt(utc,tz){return new Date(utc).toLocaleString("en-GB",
  {timeZone:tz,weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});}
function ymdTZ(d,tz){return d.toLocaleDateString("en-CA",{timeZone:tz});}      // YYYY-MM-DD
function timeHM(utc,tz){return new Date(utc).toLocaleTimeString("en-GB",
  {timeZone:tz,hour:"2-digit",minute:"2-digit"});}
function dayLabel(iso,tz){const d=new Date(iso+"T12:00:00Z");
  return {wd:d.toLocaleDateString("en-GB",{timeZone:tz,weekday:"short"}),
          dm:d.toLocaleDateString("en-GB",{timeZone:tz,day:"numeric",month:"short"})};}

async function load(){
  if(!token){ $("#stage").innerHTML=`<p class="err">No booking reference in the link.</p>`; return; }
  try{
    const r=await fetch(`/api/bookings/${encodeURIComponent(token)}`);
    if(!r.ok) throw 0;
    BK=await r.json(); render(BK);
  }catch(e){ $("#stage").innerHTML=`<p class="err">We could not find that booking. The link may have expired.</p>`; }
}

function render(b){
  const tz=b.booker_timezone, host=b.host_timezone;
  const both = tz===host ? "" : `<p class="tt note">Berlin: ${fmt(b.start_utc,host)}</p>`;
  const cls={scheduled:"b-scheduled",canceled:"b-cancelled",no_show:"b-no_show",completed:"b-scheduled"}[b.status]||"b-scheduled";
  const minsToStart=(new Date(b.start_utc)-Date.now())/60000;
  const canChange = b.status==="scheduled" && minsToStart>15;
  let action="";
  if(b.status==="scheduled"){
    action=`<div class="hr"></div>
      <a class="btn gold" href="${b.join_url}">Join the Zoom meeting</a>
      ${canChange?`<p style="margin-top:14px"><button class="btn" id="resched">Reschedule</button></p>`:
        `<p class="note" style="margin-top:14px">This meeting starts shortly and can no longer be rescheduled.</p>`}
      <p style="margin-top:6px"><button class="btn ghost" id="cancel">Cancel this booking</button></p>
      <div class="panel" id="panel"></div>`;
  }else if(b.status==="canceled"){
    action=`<div class="hr"></div><p class="tt">This booking is cancelled.</p>
      <a class="btn" href="${b.rebook_url||'/'}">Book a new time</a>`;
  }
  $("#stage").innerHTML=`
    <h1>${b.event}</h1>
    <p><span class="badge ${cls}">${b.status}</span></p>
    <p class="tt"><b>${fmt(b.start_utc,tz)}</b> (${tz.replace(/_/g," ")})</p>
    ${both}${action}`;
  const c=$("#cancel"); if(c) c.onclick=doCancel;
  const rs=$("#resched"); if(rs) rs.onclick=()=>openPicker(b);
}

async function doCancel(){
  const c=$("#cancel"); c.disabled=true; c.textContent="Cancelling…";
  try{
    const r=await fetch(`/api/bookings/${encodeURIComponent(token)}/cancel`,{method:"POST"});
    if(!r.ok) throw 0; load();
  }catch(e){ c.disabled=false; c.textContent="Cancel this booking";
    $("#stage").insertAdjacentHTML("beforeend",`<p class="err">Could not cancel. Please try again.</p>`); }
}

async function openPicker(b){
  const rs=$("#resched"); if(rs){ rs.disabled=true; rs.textContent="Loading times…"; }
  const panel=$("#panel"); const tz=b.booker_timezone;
  const today=new Date();
  const from=ymdTZ(today,tz);
  const to=ymdTZ(new Date(today.getTime()+13*864e5),tz);
  try{
    const r=await fetch(`/api/event-types/${encodeURIComponent(b.event_slug)}/slots`+
                        `?from=${from}&to=${to}&tz=${encodeURIComponent(tz)}`);
    if(!r.ok) throw 0;
    const data=await r.json(); const days=data.days||{};
    const dates=Object.keys(days).filter(d=>days[d]&&days[d].length).sort();
    if(rs){ rs.disabled=false; rs.textContent="Reschedule"; }
    if(!dates.length){ panel.innerHTML=`<p class="note" style="margin-top:12px">No times are available in the next two weeks. Please try cancelling and booking a later date.</p>`; return; }
    let sel=dates[0];
    function paint(){
      const chips=dates.map(d=>{const L=dayLabel(d,tz);
        return `<button class="chip ${d===sel?'sel':''}" data-d="${d}"><b>${L.wd}</b><small>${L.dm}</small></button>`;}).join("");
      const slots=(days[sel]||[]).map(s=>`<button class="slot" data-u="${s.utc}">${timeHM(s.utc,tz)}</button>`).join("");
      panel.innerHTML=`<div class="hr"></div>
        <p class="tt"><b>Choose a new time</b> <span class="note">(${tz.replace(/_/g," ")})</span></p>
        <div class="row" id="days">${chips}</div>
        <div class="slots" id="slotgrid">${slots}</div>
        <p class="note" id="rmsg" style="margin-top:10px"></p>`;
      panel.querySelectorAll("#days .chip").forEach(ch=>ch.onclick=()=>{sel=ch.dataset.d;paint();});
      panel.querySelectorAll("#slotgrid .slot").forEach(sb=>sb.onclick=()=>confirmMove(sb.dataset.u,tz));
    }
    paint();
  }catch(e){ if(rs){ rs.disabled=false; rs.textContent="Reschedule"; }
    panel.innerHTML=`<p class="err" style="margin-top:12px">Could not load available times. Please try again.</p>`; }
}

async function confirmMove(utc,tz){
  const msg=$("#rmsg");
  const label=new Date(utc).toLocaleString("en-GB",
    {timeZone:tz,weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
  msg.innerHTML=`Move your meeting to <b>${label}</b>? `+
    `<button class="btn" id="goMove" style="padding:6px 12px;font-size:13px;margin-left:6px">Confirm</button>`;
  $("#goMove").onclick=async()=>{
    const g=$("#goMove"); g.disabled=true; g.textContent="Moving…";
    try{
      const r=await fetch(`/api/bookings/${encodeURIComponent(token)}/reschedule`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({start_utc:utc})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.detail||"Could not reschedule");
      msg.innerHTML=`<span class="ok">Rescheduled. A new confirmation is on its way.</span>`;
      setTimeout(load,900);
    }catch(err){ g.disabled=false; g.textContent="Confirm";
      msg.innerHTML=`<span class="err">${err.message||"Could not reschedule. Please pick another time."}</span>`; }
  };
}

load();
</script>
</body>
</html>
