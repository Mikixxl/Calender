name: deploy
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG: ${{ secrets.FLY_ORG }}
      FLY_APP: ifb-scheduler
    steps:
      - uses: actions/checkout@v4

      - name: Guard on Fly token
        id: guard
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "FLY_API_TOKEN not set - skipping deploy. Nothing failed."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up flyctl
        if: steps.guard.outputs.ready == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if missing
        if: steps.guard.outputs.ready == 'true'
        run: |
          if ! flyctl apps list | grep -qw "${FLY_APP}"; then
            flyctl apps create "${FLY_APP}" ${FLY_ORG:+-o "$FLY_ORG"}
          fi

      - name: Stage runtime secrets
        if: steps.guard.outputs.ready == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          TICK_TOKEN: ${{ secrets.TICK_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        run: |
          set -e
          PAIRS=()
          for k in DATABASE_URL GMAIL_USER GMAIL_APP_PASSWORD MAIL_FROM_NAME TICK_TOKEN ADMIN_TOKEN PUBLIC_API_URL PUBLIC_SITE_URL CORS_ORIGINS; do
            v="${!k}"
            if [ -n "$v" ]; then PAIRS+=("$k=$v"); fi
          done
          if [ ${#PAIRS[@]} -gt 0 ]; then
            flyctl secrets set "${PAIRS[@]}" --stage --app "${FLY_APP}"
          else
            echo "No runtime secrets present to stage yet."
          fi

      - name: Deploy to Fly (Frankfurt)
        if: steps.guard.outputs.ready == 'true'
        working-directory: backend
        run: flyctl deploy --remote-only --app "${FLY_APP}"

      - name: Smoke test (health + DB-backed event-types)
        if: steps.guard.outputs.ready == 'true'
        run: |
          set -e
          API="https://ifb-scheduler.fly.dev"
          echo "Waiting for /healthz (cold start tolerated) ..."
          ok=""
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$API/healthz" || true)
            if [ "$code" = "200" ]; then ok=1; echo "healthz 200 on attempt $i"; break; fi
            echo "  attempt $i: healthz HTTP $code"; sleep 3
          done
          if [ -z "$ok" ]; then echo "healthz never returned 200 - deploy unhealthy"; exit 1; fi

          echo "Checking DB-backed /api/event-types ..."
          body=$(curl -s --max-time 15 "$API/api/event-types" || true)
          echo "event-types body: $body"
          echo "$body" | grep -q "initial-prospective-client-video-conference-30-min" \
            || { echo "seeded event-type slug missing - DB wiring failed"; exit 1; }
          echo "SMOKE TEST PASSED: app live + Postgres reachable + seed present."
