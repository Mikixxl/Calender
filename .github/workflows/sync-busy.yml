name: sync-busy

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-busy
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "asyncpg==0.30.0" "requests>=2.31,<3"
      - name: Sync busy blocks
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/sync_busy.py
